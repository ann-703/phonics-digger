<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Digger Learning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #scene {
      position: fixed; inset: 0; z-index: 0;
      display: flex; flex-direction: column;
    }
    #sky  { flex: 1; background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 100%); }
    #ground { height: 120px; background: linear-gradient(180deg, #8B6914 0%, #6B4F10 100%); }

    #title {
      position: fixed;
      top: 8%;
      width: 100%;
      text-align: center;
      z-index: 10;
      font-size: 30px;
      font-weight: 900;
      color: #1a1a2e;
      text-shadow: 0 2px 10px rgba(255,255,255,0.9);
      letter-spacing: 1px;
    }

    #cards {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 32px;
      z-index: 10;
    }

    .subject-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.93);
      border-radius: 24px;
      padding: 24px 28px 22px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.18), 0 14px 36px rgba(0,0,0,0.18);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .subject-card:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 rgba(0,0,0,0.18), 0 6px 16px rgba(0,0,0,0.15);
    }

    .blocks {
      display: flex;
      gap: 10px;
    }
    .block {
      width: 66px;
      height: 66px;
      border-radius: 12px;
      background: #FFF9E6;
      border: 4px solid #E8C84A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 900;
      color: #333;
      box-shadow: 0 5px 0 #C8A830;
    }

    .mini-digger { width: 110px; height: 73px; }

    .card-label {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    #phonics-card { border: 4px solid #4CAF50; }
    #phonics-card .block { border-color: #4CAF50; box-shadow: 0 5px 0 #388E3C; color: #2E7D32; }
    #phonics-card .card-label { color: #2E7D32; }

    #maths-card { border: 4px solid #7C4DFF; }
    #maths-card .block { border-color: #7C4DFF; box-shadow: 0 5px 0 #512DA8; color: #512DA8; }
    #maths-card .card-label { color: #512DA8; }

    @media (max-width: 520px) {
      #cards { flex-direction: column; gap: 20px; }
      #title { font-size: 22px; top: 5%; }
      .block { width: 52px; height: 52px; font-size: 26px; }
      .card-label { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div id="scene">
    <div id="sky"></div>
    <div id="ground"></div>
  </div>

  <div id="title">What shall we learn today?</div>

  <div id="cards">

    <a href="phonics.html" class="subject-card" id="phonics-card">
      <div class="blocks">
        <div class="block">A</div>
        <div class="block">B</div>
        <div class="block">C</div>
      </div>
      <svg class="mini-digger" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="30" width="70" height="30" rx="6" fill="#F5A623"/>
        <rect x="45" y="15" width="35" height="25" rx="4" fill="#F5A623"/>
        <rect x="50" y="19" width="25" height="15" rx="3" fill="#AEE4FF" opacity="0.85"/>
        <rect x="78" y="22" width="12" height="8" rx="2" fill="#E8941A"/>
        <line x1="84" y1="26" x2="108" y2="18" stroke="#E8941A" stroke-width="6" stroke-linecap="round"/>
        <polygon points="104,14 114,14 110,26 100,26" fill="#D4800A"/>
        <rect x="46" y="8" width="5" height="9" rx="2" fill="#333"/>
        <circle cx="22" cy="62" r="11" fill="#333"/>
        <circle cx="22" cy="62" r="6" fill="#555"/>
        <circle cx="22" cy="62" r="2" fill="#888"/>
        <circle cx="62" cy="62" r="11" fill="#333"/>
        <circle cx="62" cy="62" r="6" fill="#555"/>
        <circle cx="62" cy="62" r="2" fill="#888"/>
        <rect x="10" y="58" width="72" height="8" rx="4" fill="#222"/>
      </svg>
      <div class="card-label">PHONICS</div>
    </a>

    <a href="maths.html" class="subject-card" id="maths-card">
      <div class="blocks">
        <div class="block">1</div>
        <div class="block">2</div>
        <div class="block">3</div>
      </div>
      <svg class="mini-digger" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="30" width="70" height="30" rx="6" fill="#F5A623"/>
        <rect x="45" y="15" width="35" height="25" rx="4" fill="#F5A623"/>
        <rect x="50" y="19" width="25" height="15" rx="3" fill="#AEE4FF" opacity="0.85"/>
        <rect x="78" y="22" width="12" height="8" rx="2" fill="#E8941A"/>
        <line x1="84" y1="26" x2="108" y2="18" stroke="#E8941A" stroke-width="6" stroke-linecap="round"/>
        <polygon points="104,14 114,14 110,26 100,26" fill="#D4800A"/>
        <rect x="46" y="8" width="5" height="9" rx="2" fill="#333"/>
        <circle cx="22" cy="62" r="11" fill="#333"/>
        <circle cx="22" cy="62" r="6" fill="#555"/>
        <circle cx="22" cy="62" r="2" fill="#888"/>
        <circle cx="62" cy="62" r="11" fill="#333"/>
        <circle cx="62" cy="62" r="6" fill="#555"/>
        <circle cx="62" cy="62" r="2" fill="#888"/>
        <rect x="10" y="58" width="72" height="8" rx="4" fill="#222"/>
      </svg>
      <div class="card-label">MATHS</div>
    </a>

  </div>

</body>
</html>
